<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <title>HIDProxBox — GitHub Social Preview</title>
  <defs>
    <!-- Dot grid background pattern -->
    <pattern id="dotgrid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1E2D45" opacity="0.8"/>
    </pattern>
    <!-- Cyan glow radial gradient (behind icon) -->
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <!-- Blue glow radial gradient -->
    <radialGradient id="glow-blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#3B82F6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <!-- Bottom gradient fade -->
    <linearGradient id="fade-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#090D1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#090D1A" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Left accent gradient -->
    <linearGradient id="accent-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- ======= BACKGROUND ======= -->
  <rect width="1280" height="640" fill="#090D1A"/>
  <rect width="1280" height="640" fill="url(#dotgrid)"/>

  <!-- Subtle circuit traces in background -->
  <!-- Horizontal traces -->
  <line x1="0" y1="120" x2="240" y2="120" stroke="#1E2D45" stroke-width="1.5"/>
  <line x1="240" y1="120" x2="240" y2="200" stroke="#1E2D45" stroke-width="1.5"/>
  <circle cx="240" cy="120" r="3" fill="#1E2D45"/>

  <line x1="1280" y1="480" x2="1040" y2="480" stroke="#1E2D45" stroke-width="1.5"/>
  <line x1="1040" y1="480" x2="1040" y2="400" stroke="#1E2D45" stroke-width="1.5"/>
  <circle cx="1040" cy="480" r="3" fill="#1E2D45"/>

  <line x1="0" y1="520" x2="180" y2="520" stroke="#1E2D45" stroke-width="1"/>
  <line x1="1280" y1="160" x2="1100" y2="160" stroke="#1E2D45" stroke-width="1"/>

  <!-- ======= GLOW EFFECTS ======= -->
  <ellipse cx="640" cy="280" rx="320" ry="200" fill="url(#glow-cyan)"/>
  <ellipse cx="640" cy="320" rx="400" ry="240" fill="url(#glow-blue)"/>

  <!-- ======= ICON (centered, ~180px equivalent) ======= -->
  <!-- Icon centered at (640, 240), scaled ~2.8x from 64×64 viewBox -->
  <g transform="translate(460, 100) scale(2.8125)">
    <!-- Main proxy box -->
    <rect x="15" y="7" width="34" height="50" rx="5"
          fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <!-- Circuit corner pads -->
    <rect x="15" y="7"  width="5" height="5" fill="#22D3EE" opacity="0.55" rx="1"/>
    <rect x="44" y="7"  width="5" height="5" fill="#22D3EE" opacity="0.55" rx="1"/>
    <rect x="15" y="52" width="5" height="5" fill="#22D3EE" opacity="0.55" rx="1"/>
    <rect x="44" y="52" width="5" height="5" fill="#22D3EE" opacity="0.55" rx="1"/>
    <!-- Input line + node (cyan) -->
    <line x1="3" y1="32" x2="15" y2="32" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="3" cy="32" r="3" fill="#22D3EE"/>
    <!-- Internal routing -->
    <line x1="17" y1="32" x2="24.5" y2="32" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="29" cy="32" r="4.5" fill="#3B82F6"/>
    <circle cx="29" cy="32" r="1.8" fill="#1E293B"/>
    <line x1="33.5" y1="32" x2="40" y2="32" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="17" x2="40" y2="47" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="17" x2="49" y2="17" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="27" x2="49" y2="27" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="37" x2="49" y2="37" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="47" x2="49" y2="47" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <!-- Output lines (blue) -->
    <line x1="49" y1="17" x2="59" y2="17" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="27" x2="59" y2="27" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="37" x2="59" y2="37" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="47" x2="59" y2="47" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="17" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="27" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="37" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="47" r="2.5" fill="#3B82F6"/>
  </g>

  <!-- ======= PRODUCT NAME ======= -->
  <text
    x="640" y="400"
    text-anchor="middle"
    font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
    font-size="88"
    font-weight="700"
    letter-spacing="-2">
    <tspan fill="#22D3EE">HID</tspan><tspan fill="#F1F5F9">Prox</tspan><tspan fill="#3B82F6">Box</tspan>
  </text>

  <!-- ======= TAGLINE ======= -->
  <text
    x="640" y="452"
    text-anchor="middle"
    font-family="'Inter',system-ui,-apple-system,sans-serif"
    font-size="28"
    fill="#94A3B8"
    letter-spacing="0.5">
    One keyboard. Four computers. Zero software on the targets.
  </text>

  <!-- ======= DIVIDER ======= -->
  <line x1="440" y1="482" x2="840" y2="482" stroke="#334155" stroke-width="1"/>

  <!-- ======= FEATURE BADGES ======= -->
  <!-- Badge 1: 4-Port KVM -->
  <g transform="translate(345, 505)">
    <rect width="140" height="38" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="20" cy="19" r="5" fill="#22D3EE" opacity="0.8"/>
    <text x="34" y="24"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#94A3B8">4-Port KVM</text>
  </g>

  <!-- Badge 2: USB + Bluetooth -->
  <g transform="translate(502, 505)">
    <rect width="168" height="38" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="20" cy="19" r="5" fill="#3B82F6" opacity="0.8"/>
    <text x="34" y="24"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#94A3B8">USB + Bluetooth</text>
  </g>

  <!-- Badge 3: Raspberry Pi -->
  <g transform="translate(687, 505)">
    <rect width="152" height="38" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="20" cy="19" r="5" fill="#22D3EE" opacity="0.8"/>
    <text x="34" y="24"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#94A3B8">Raspberry Pi</text>
  </g>

  <!-- Badge 4: Open Source -->
  <g transform="translate(856, 505)">
    <rect width="140" height="38" rx="6" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <circle cx="20" cy="19" r="5" fill="#3B82F6" opacity="0.8"/>
    <text x="34" y="24"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#94A3B8">Open Source</text>
  </g>

  <!-- ======= BOTTOM ACCENT BAR ======= -->
  <rect x="0" y="630" width="1280" height="10" rx="0" fill="url(#accent-left)"/>

  <!-- Bottom overlay fade -->
  <rect width="1280" height="640" fill="url(#fade-bottom)"/>
</svg>
