<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <title>HIDProxBox — CTA + Footer Mockup</title>
  <defs>
    <pattern id="cta-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#1E2D45" opacity="0.85"/>
    </pattern>
  </defs>

  <!-- Background: Midnight with dot grid -->
  <rect width="1280" height="320" fill="#090D1A"/>
  <rect width="1280" height="320" fill="url(#cta-dots)"/>

  <!-- ── Circuit accent traces ──────────────────────────────── -->
  <g stroke="#1E2D45" stroke-width="1.5" fill="none" opacity="0.7">
    <polyline points="0,40  60,40  60,80 100,80"/>
    <circle cx="60"  cy="40" r="3" fill="#1E2D45" stroke="none"/>
    <circle cx="60"  cy="80" r="3" fill="#1E2D45" stroke="none"/>
    <polyline points="1280,50 1210,50 1210,90 1170,90"/>
    <circle cx="1210" cy="50" r="3" fill="#1E2D45" stroke="none"/>
    <circle cx="1210" cy="90" r="3" fill="#1E2D45" stroke="none"/>
  </g>

  <!-- ── CTA Section ────────────────────────────────────────── -->

  <!-- Pre-heading badge — centered -->
  <rect x="554" y="44" width="172" height="26" rx="13" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="572" cy="57" r="3.5" fill="#22D3EE"/>
  <text x="582" y="62" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#94A3B8">Open Source · MIT License</text>

  <!-- Main headline -->
  <text x="640" y="118" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="48" font-weight="700" fill="#F1F5F9">
    Build yours this weekend.
  </text>

  <!-- Sub-line -->
  <text x="640" y="152" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="17" fill="#94A3B8">
    All firmware, all code, all wiring diagrams — in the repo.
  </text>

  <!-- ── CTA Buttons ─────────────────────────────────────────── -->
  <!-- Primary button -->
  <rect x="466" y="182" width="190" height="52" rx="8" fill="#3B82F6"/>
  <text x="561" y="212" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#F1F5F9">
    Clone on GitHub →
  </text>

  <!-- Ghost button -->
  <rect x="672" y="182" width="174" height="52" rx="8" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="759" y="212" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600" fill="#94A3B8">
    Browse the Docs
  </text>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <line x1="48" y1="258" x2="1232" y2="258" stroke="#1E293B" stroke-width="1"/>

  <!-- Footer left: copyright -->
  <text x="48" y="282" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#475569">
    © 2026 HIDProxBox — MIT License
  </text>

  <!-- Footer center: nav links -->
  <text x="490" y="282" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#475569">GitHub</text>
  <circle cx="536" cy="278" r="2" fill="#334155"/>
  <text x="546" y="282" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#475569">Docs</text>
  <circle cx="582" cy="278" r="2" fill="#334155"/>
  <text x="592" y="282" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#475569">Firmware</text>
  <circle cx="650" cy="278" r="2" fill="#334155"/>
  <text x="660" y="282" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#475569">Hackaday</text>
  <circle cx="720" cy="278" r="2" fill="#334155"/>
  <text x="730" y="282" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#475569">r/raspberry_pi</text>

  <!-- Footer right: built-with note -->
  <text x="1232" y="282" text-anchor="end" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#334155">
    Built on Raspberry Pi
  </text>
  <!-- Small icon mark in footer -->
  <g transform="translate(1177,268) scale(0.28)">
    <rect x="15" y="7" width="34" height="50" rx="5" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="3"  cy="32" r="3" fill="#22D3EE"/>
    <circle cx="29" cy="32" r="4.5" fill="#3B82F6"/>
    <circle cx="60" cy="17" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="27" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="37" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="47" r="2.5" fill="#3B82F6"/>
  </g>

  <!-- ── Spec annotations ────────────────────────────────────── -->
  <text x="25" y="313" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#334155">
    CTA: pill badge (rx=13) · headline --text-heading 48px · btn--primary w=190 h=52 · btn--ghost · footer divider=--color-border-light · footer text=--color-text-dim
  </text>
</svg>
