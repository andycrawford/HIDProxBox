<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" width="1280" height="460">
  <title>HIDProxBox — Feature Grid Mockup</title>

  <!-- Background: Navy surface -->
  <rect width="1280" height="460" fill="#0F172A"/>

  <!-- ── Section heading ─────────────────────────────────────── -->
  <text x="640" y="58" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700" fill="#F1F5F9">
    Everything in one box
  </text>
  <text x="640" y="84" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="15" fill="#475569">
    Eight reasons the commercial options fall short
  </text>

  <!--
    4 columns × 2 rows of feature cards
    Margins: 48px each side → usable width: 1184px
    Card width: (1184 − 3×20) / 4 = 281px   Card height: 148px   Gap: 20px
    Row 1 y: 112    Row 2 y: 280

    ROW 1 — Input/Source features (cyan border + dot)
    ROW 2 — Output/Control features (blue border + dot)
  -->

  <!-- ── ROW 1 (cyan) ─────────────────────────────────────────── -->

  <!-- Card 1: 4-Port Instant Switching -->
  <rect x="48"  y="112" width="281" height="148" rx="8" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
  <rect x="48"  y="112" width="281" height="3"   rx="2" fill="#22D3EE"/>
  <circle cx="68" cy="142" r="4" fill="#22D3EE"/>
  <text x="80" y="147" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">4-Port Instant Switching</text>
  <text x="60" y="168" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Dedicated selector buttons with</text>
  <text x="60" y="184" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">LED confirmation. Zero warm-up.</text>
  <!-- Simple icon: 4 horizontal lines -->
  <g stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round" opacity="0.5">
    <line x1="60" y1="212" x2="84" y2="212"/>
    <line x1="60" y1="219" x2="84" y2="219"/>
    <line x1="60" y1="226" x2="84" y2="226"/>
    <line x1="60" y1="233" x2="84" y2="233"/>
  </g>
  <text x="92" y="234" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#22D3EE">INPUT</text>

  <!-- Card 2: Wired + Wireless Input -->
  <rect x="349" y="112" width="281" height="148" rx="8" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
  <rect x="349" y="112" width="281" height="3"   rx="2" fill="#22D3EE"/>
  <circle cx="369" cy="142" r="4" fill="#22D3EE"/>
  <text x="381" y="147" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">Wired + Wireless Input</text>
  <text x="361" y="168" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">USB keyboard via evdev or any</text>
  <text x="361" y="184" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Bluetooth HID keyboard.</text>
  <!-- Simple icon: keyboard outline + wave -->
  <rect x="361" y="208" width="32" height="20" rx="3" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.5"/>
  <text x="399" y="222" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#22D3EE">INPUT</text>

  <!-- Card 3: Programmable Macros -->
  <rect x="650" y="112" width="281" height="148" rx="8" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
  <rect x="650" y="112" width="281" height="3"   rx="2" fill="#22D3EE"/>
  <circle cx="670" cy="142" r="4" fill="#22D3EE"/>
  <text x="682" y="147" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">Programmable Macros</text>
  <text x="662" y="168" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Map HID keystroke sequences to</text>
  <text x="662" y="184" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">button presses via config.py.</text>
  <!-- Icon: code brackets -->
  <text x="662" y="232" font-family="'JetBrains Mono',monospace" font-size="14" fill="#22D3EE" opacity="0.6">&lt; / &gt;</text>
  <text x="700" y="232" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#22D3EE">INPUT</text>

  <!-- Card 4: Zero Target Software -->
  <rect x="951" y="112" width="281" height="148" rx="8" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
  <rect x="951" y="112" width="281" height="3"   rx="2" fill="#22D3EE"/>
  <circle cx="971" cy="142" r="4" fill="#22D3EE"/>
  <text x="983" y="147" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">Zero Target Software</text>
  <text x="963" y="168" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Each CH552T appears as a</text>
  <text x="963" y="184" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">standard USB HID device.</text>
  <!-- Icon: shield check -->
  <path d="M963 206 l8-4 8 4 v8 c0 4-8 8-8 8 s-8-4-8-8 z" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-linejoin="round" opacity="0.5"/>
  <text x="987" y="222" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#22D3EE">INPUT</text>

  <!-- ── ROW 2 (blue) ─────────────────────────────────────────── -->

  <!-- Card 5: USB + Bluetooth Output -->
  <rect x="48"  y="280" width="281" height="148" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
  <rect x="48"  y="280" width="281" height="3"   rx="2" fill="#3B82F6"/>
  <circle cx="68" cy="310" r="4" fill="#3B82F6"/>
  <text x="80" y="315" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">USB + Bluetooth Output</text>
  <text x="60" y="336" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Relay via CH552T USB HID or</text>
  <text x="60" y="352" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Pi's own Bluetooth HID mode.</text>
  <text x="60" y="400" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#3B82F6">OUTPUT</text>

  <!-- Card 6: Browser Control Panel -->
  <rect x="349" y="280" width="281" height="148" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
  <rect x="349" y="280" width="281" height="3"   rx="2" fill="#3B82F6"/>
  <circle cx="369" cy="310" r="4" fill="#3B82F6"/>
  <text x="381" y="315" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">Browser Control Panel</text>
  <text x="361" y="336" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Switch computers from any phone</text>
  <text x="361" y="352" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">or browser — built-in web UI.</text>
  <!-- Browser icon -->
  <rect x="361" y="372" width="32" height="22" rx="3" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
  <line x1="361" y1="380" x2="393" y2="380" stroke="#3B82F6" stroke-width="1" opacity="0.5"/>
  <text x="399" y="388" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#3B82F6">OUTPUT</text>

  <!-- Card 7: Touchscreen Display -->
  <rect x="650" y="280" width="281" height="148" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
  <rect x="650" y="280" width="281" height="3"   rx="2" fill="#3B82F6"/>
  <circle cx="670" cy="310" r="4" fill="#3B82F6"/>
  <text x="682" y="315" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">Optional Touchscreen</text>
  <text x="662" y="336" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Local tkinter GUI with tally</text>
  <text x="662" y="352" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">lights and one-tap switching.</text>
  <text x="662" y="400" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#3B82F6">OUTPUT</text>

  <!-- Card 8: Open-Source & Hackable -->
  <rect x="951" y="280" width="281" height="148" rx="8" fill="#1E293B" stroke="#3B82F6" stroke-width="1"/>
  <rect x="951" y="280" width="281" height="3"   rx="2" fill="#3B82F6"/>
  <circle cx="971" cy="310" r="4" fill="#3B82F6"/>
  <text x="983" y="315" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">Open-Source &amp; Hackable</text>
  <text x="963" y="336" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Clean producer-consumer arch.</text>
  <text x="963" y="352" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#94A3B8">Extend in a few dozen lines.</text>
  <text x="963" y="400" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#3B82F6">OUTPUT</text>

  <!-- ── Spec annotations ────────────────────────────────────── -->
  <text x="25" y="453" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#334155">
    Card: w=281px h=148px rx=8 · 3px accent top strip · --color-bg-card fill · Cyan=input rows / Blue=output rows · gap=20px · margin=48px
  </text>
</svg>
