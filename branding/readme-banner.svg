<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 200" width="1280" height="200">
  <title>HIDProxBox — README Banner</title>
  <defs>
    <!-- Subtle dot grid -->
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.8" fill="#1E2D45" opacity="0.9"/>
    </pattern>
    <!-- Left-to-right fade for the right side content area -->
    <linearGradient id="side-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#090D1A" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0C1323" stop-opacity="1"/>
    </linearGradient>
    <!-- Bottom accent bar gradient -->
    <linearGradient id="bar-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="50%"  stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Vertical separator gradient -->
    <linearGradient id="sep-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#334155" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#334155" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#334155" stop-opacity="1"/>
      <stop offset="100%" stop-color="#334155" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ======= BACKGROUND ======= -->
  <rect width="1280" height="200" fill="#0F172A"/>
  <rect width="1280" height="200" fill="url(#dots)"/>

  <!-- Subtle horizontal circuit traces -->
  <line x1="0"    y1="40"  x2="60"  y2="40"  stroke="#1E2D45" stroke-width="1"/>
  <line x1="60"   y1="40"  x2="60"  y2="70"  stroke="#1E2D45" stroke-width="1"/>
  <circle cx="60" cy="40" r="2" fill="#1E2D45"/>

  <line x1="1280" y1="140" x2="1220" y2="140" stroke="#1E2D45" stroke-width="1"/>
  <line x1="1220" y1="140" x2="1220" y2="110" stroke="#1E2D45" stroke-width="1"/>
  <circle cx="1220" cy="140" r="2" fill="#1E2D45"/>

  <!-- ======= LEFT PANEL: Icon ======= -->
  <!-- Icon centered vertically in 200px height, at x=48 -->
  <!-- Scale factor: 1.375 → icon renders at 88×88 from 64×64 viewBox -->
  <g transform="translate(32, 56) scale(1.375)">
    <!-- Main proxy box -->
    <rect x="15" y="7" width="34" height="50" rx="5"
          fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <rect x="15" y="7"  width="5" height="5" fill="#22D3EE" opacity="0.55" rx="1"/>
    <rect x="44" y="7"  width="5" height="5" fill="#22D3EE" opacity="0.55" rx="1"/>
    <rect x="15" y="52" width="5" height="5" fill="#22D3EE" opacity="0.55" rx="1"/>
    <rect x="44" y="52" width="5" height="5" fill="#22D3EE" opacity="0.55" rx="1"/>

    <line x1="3" y1="32" x2="15" y2="32" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="3" cy="32" r="3" fill="#22D3EE"/>

    <line x1="17" y1="32" x2="24.5" y2="32" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="29" cy="32" r="4.5" fill="#3B82F6"/>
    <circle cx="29" cy="32" r="1.8" fill="#1E293B"/>
    <line x1="33.5" y1="32" x2="40" y2="32" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="17" x2="40" y2="47" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>

    <line x1="40" y1="17" x2="49" y2="17" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="27" x2="49" y2="27" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="37" x2="49" y2="37" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="47" x2="49" y2="47" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>

    <line x1="49" y1="17" x2="59" y2="17" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="27" x2="59" y2="27" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="37" x2="59" y2="37" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="47" x2="59" y2="47" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="17" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="27" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="37" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="47" r="2.5" fill="#3B82F6"/>
  </g>

  <!-- ======= WORDMARK ======= -->
  <!-- Icon is ~88px wide, starts at x=32, so wordmark at x=32+88+16=136 -->
  <text
    x="136" y="108"
    font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
    font-size="52"
    font-weight="700"
    letter-spacing="-1">
    <tspan fill="#22D3EE">HID</tspan><tspan fill="#F1F5F9">Prox</tspan><tspan fill="#3B82F6">Box</tspan>
  </text>

  <!-- Sub-label -->
  <text
    x="138" y="136"
    font-family="'Inter',system-ui,-apple-system,sans-serif"
    font-size="16"
    fill="#475569"
    letter-spacing="0.5">
    Bluetooth/USB KVM Proxy for Raspberry Pi
  </text>

  <!-- ======= VERTICAL SEPARATOR ======= -->
  <line x1="560" y1="0" x2="560" y2="200" stroke="url(#sep-grad)" stroke-width="1"/>

  <!-- ======= RIGHT PANEL: Feature list ======= -->
  <!-- Three columns of feature pills/stats -->

  <!-- Column 1 -->
  <g transform="translate(596, 54)">
    <rect width="170" height="30" rx="5" fill="#1E293B" stroke="#22D3EE" stroke-width="1" opacity="0.8"/>
    <text x="12" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#22D3EE">&#x2022; 4-Port KVM Switching</text>
  </g>
  <g transform="translate(596, 96)">
    <rect width="170" height="30" rx="5" fill="#1E293B" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
    <text x="12" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#94A3B8">&#x2022; USB + Bluetooth I/O</text>
  </g>
  <g transform="translate(596, 138)">
    <rect width="170" height="30" rx="5" fill="#1E293B" stroke="#22D3EE" stroke-width="1" opacity="0.4"/>
    <text x="12" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#64748B">&#x2022; Web + Button Control</text>
  </g>

  <!-- Column 2 -->
  <g transform="translate(786, 54)">
    <rect width="170" height="30" rx="5" fill="#1E293B" stroke="#3B82F6" stroke-width="1" opacity="0.8"/>
    <text x="12" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#3B82F6">&#x2022; No Target Software</text>
  </g>
  <g transform="translate(786, 96)">
    <rect width="170" height="30" rx="5" fill="#1E293B" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
    <text x="12" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#94A3B8">&#x2022; HID Macros</text>
  </g>
  <g transform="translate(786, 138)">
    <rect width="170" height="30" rx="5" fill="#1E293B" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>
    <text x="12" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="13" font-weight="600" fill="#64748B">&#x2022; MIT Open Source</text>
  </g>

  <!-- Column 3: Stats -->
  <g transform="translate(976, 54)">
    <text x="0" y="0"
          font-family="'JetBrains Mono','Courier New',monospace"
          font-size="36" font-weight="700" fill="#F1F5F9">4</text>
    <text x="0" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="12" fill="#475569">computers</text>
  </g>
  <g transform="translate(1060, 54)">
    <text x="0" y="0"
          font-family="'JetBrains Mono','Courier New',monospace"
          font-size="36" font-weight="700" fill="#22D3EE">2</text>
    <text x="0" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="12" fill="#475569">input modes</text>
  </g>
  <g transform="translate(1155, 54)">
    <text x="0" y="0"
          font-family="'JetBrains Mono','Courier New',monospace"
          font-size="36" font-weight="700" fill="#3B82F6">&#x3c;$100</text>
    <text x="0" y="20"
          font-family="'Inter',system-ui,sans-serif"
          font-size="12" fill="#475569">total build</text>
  </g>

  <!-- Tagline across full bottom right -->
  <text
    x="596" y="185"
    font-family="'Inter',system-ui,sans-serif"
    font-size="14"
    fill="#334155"
    font-style="italic"
    letter-spacing="0.3">
    "One keyboard. Four computers. Zero software on the targets."
  </text>

  <!-- ======= BOTTOM ACCENT BAR ======= -->
  <rect x="0" y="194" width="1280" height="6" fill="url(#bar-grad)"/>
</svg>
