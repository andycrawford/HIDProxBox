<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" width="1280" height="560">
  <title>HIDProxBox — Hero Section Mockup</title>
  <defs>
    <pattern id="hero-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#1E2D45" opacity="0.85"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="560" fill="#090D1A"/>
  <rect width="1280" height="560" fill="url(#hero-dots)"/>

  <!-- ── Navigation Bar ─────────────────────────────────────── -->
  <rect width="1280" height="60" fill="#090D1A" opacity="0.96"/>
  <rect x="0" y="59" width="1280" height="1" fill="#334155" opacity="0.6"/>

  <!-- Nav: logo at ~0.68× scale -->
  <g transform="translate(40,8) scale(0.68)">
    <rect x="15" y="7" width="34" height="50" rx="5" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <rect x="15" y="7"  width="5" height="5" fill="#22D3EE" opacity="0.45" rx="1"/>
    <rect x="44" y="7"  width="5" height="5" fill="#22D3EE" opacity="0.45" rx="1"/>
    <rect x="15" y="52" width="5" height="5" fill="#22D3EE" opacity="0.45" rx="1"/>
    <rect x="44" y="52" width="5" height="5" fill="#22D3EE" opacity="0.45" rx="1"/>
    <line x1="3"  y1="32" x2="15"   y2="32" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="3" cy="32" r="3" fill="#22D3EE"/>
    <line x1="17" y1="32" x2="24.5" y2="32" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="29" cy="32" r="4.5" fill="#3B82F6"/>
    <circle cx="29" cy="32" r="1.8" fill="#1E293B"/>
    <line x1="33.5" y1="32" x2="40" y2="32" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40"   y1="17" x2="40" y2="47" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="17" x2="49" y2="17" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="27" x2="49" y2="27" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="37" x2="49" y2="37" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="47" x2="49" y2="47" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="49" y1="17" x2="59" y2="17" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="27" x2="59" y2="27" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="37" x2="59" y2="37" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="47" x2="59" y2="47" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="17" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="27" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="37" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="47" r="2.5" fill="#3B82F6"/>
    <text x="76" y="42" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="24" font-weight="700" letter-spacing="-0.5">
      <tspan fill="#22D3EE">HID</tspan><tspan fill="#F1F5F9">Prox</tspan><tspan fill="#3B82F6">Box</tspan>
    </text>
  </g>

  <!-- Nav links -->
  <text x="808"  y="36" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#94A3B8">Features</text>
  <text x="886"  y="36" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#94A3B8">Use Cases</text>
  <text x="980"  y="36" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#94A3B8">BOM</text>
  <text x="1030" y="36" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#94A3B8">GitHub</text>
  <!-- Nav CTA -->
  <rect x="1096" y="14" width="136" height="34" rx="6" fill="#3B82F6"/>
  <text x="1164" y="35" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#F1F5F9">Get Started</text>

  <!-- ── Circuit accent traces ──────────────────────────────── -->
  <g stroke="#1E2D45" stroke-width="1.5" fill="none" opacity="0.7">
    <polyline points="0,130  90,130  90,178 140,178"/>
    <circle cx="90"  cy="130" r="3" fill="#1E2D45" stroke="none"/>
    <circle cx="90"  cy="178" r="3" fill="#1E2D45" stroke="none"/>
    <polyline points="1280,110 1185,110 1185,158 1140,158"/>
    <circle cx="1185" cy="110" r="3" fill="#1E2D45" stroke="none"/>
    <circle cx="1185" cy="158" r="3" fill="#1E2D45" stroke="none"/>
    <polyline points="0,458  80,458  80,500 130,500"/>
    <circle cx="80"   cy="458" r="3" fill="#1E2D45" stroke="none"/>
    <circle cx="80"   cy="500" r="3" fill="#1E2D45" stroke="none"/>
    <polyline points="1280,470 1195,470 1195,510 1148,510"/>
    <circle cx="1195" cy="470" r="3" fill="#1E2D45" stroke="none"/>
    <circle cx="1195" cy="510" r="3" fill="#1E2D45" stroke="none"/>
  </g>

  <!-- ── Hero logo — 2× scale, centered ────────────────────── -->
  <!-- Total ink width ≈ 458px (icon 128 + gap 18 + wordmark 312) → start x=411 -->
  <g transform="translate(411,108) scale(2)">
    <rect x="15" y="7" width="34" height="50" rx="5" fill="#1E293B" stroke="#3B82F6" stroke-width="2"/>
    <rect x="15" y="7"  width="5" height="5" fill="#22D3EE" opacity="0.45" rx="1"/>
    <rect x="44" y="7"  width="5" height="5" fill="#22D3EE" opacity="0.45" rx="1"/>
    <rect x="15" y="52" width="5" height="5" fill="#22D3EE" opacity="0.45" rx="1"/>
    <rect x="44" y="52" width="5" height="5" fill="#22D3EE" opacity="0.45" rx="1"/>
    <line x1="3"  y1="32" x2="15"   y2="32" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="3" cy="32" r="3" fill="#22D3EE"/>
    <line x1="17" y1="32" x2="24.5" y2="32" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="29" cy="32" r="4.5" fill="#3B82F6"/>
    <circle cx="29" cy="32" r="1.8" fill="#1E293B"/>
    <line x1="33.5" y1="32" x2="40" y2="32" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40"   y1="17" x2="40" y2="47" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="17" x2="49" y2="17" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="27" x2="49" y2="27" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="37" x2="49" y2="37" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="40" y1="47" x2="49" y2="47" stroke="#3B82F6" stroke-width="1" stroke-linecap="round"/>
    <line x1="49" y1="17" x2="59" y2="17" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="27" x2="59" y2="27" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="37" x2="59" y2="37" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <line x1="49" y1="47" x2="59" y2="47" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="17" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="27" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="37" r="2.5" fill="#3B82F6"/>
    <circle cx="60" cy="47" r="2.5" fill="#3B82F6"/>
  </g>

  <!-- Wordmark: x=411+128+18=557, baseline at ~195 (icon ink center 108+64=172, +23 for cap) -->
  <text x="557" y="195"
        font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
        font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="#22D3EE">HID</tspan><tspan fill="#F1F5F9">Prox</tspan><tspan fill="#3B82F6">Box</tspan>
  </text>

  <!-- ── Tagline ────────────────────────────────────────────── -->
  <text x="640" y="264" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="20" fill="#94A3B8">
    One keyboard. Four computers. Zero software on the targets.
  </text>

  <!-- Sub-tagline -->
  <text x="640" y="296" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="14" fill="#475569">
    Open-source Raspberry Pi KVM proxy — hardware-level USB and Bluetooth HID switching
  </text>

  <!-- ── CTA Buttons ──────────────────────────────────────── -->
  <!-- Primary -->
  <rect x="496" y="340" width="170" height="48" rx="8" fill="#3B82F6"/>
  <text x="581" y="369" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#F1F5F9">
    View on GitHub →
  </text>
  <!-- Ghost -->
  <rect x="682" y="340" width="150" height="48" rx="8" fill="none" stroke="#334155" stroke-width="1.5"/>
  <text x="757" y="369" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#94A3B8">
    Read the Docs
  </text>

  <!-- ── Status badges ─────────────────────────────────────── -->
  <!-- MIT License -->
  <rect x="492" y="412" width="96" height="26" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="507" cy="425" r="3.5" fill="#94A3B8"/>
  <text x="517" y="430" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#94A3B8">MIT License</text>
  <!-- Raspberry Pi -->
  <rect x="600" y="412" width="104" height="26" rx="5" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <circle cx="615" cy="425" r="3.5" fill="#3B82F6"/>
  <text x="625" y="430" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#94A3B8">Raspberry Pi</text>
  <!-- 4-Port KVM (cyan accent) -->
  <rect x="716" y="412" width="90" height="26" rx="5" fill="#1E293B" stroke="#22D3EE" stroke-width="1"/>
  <circle cx="731" cy="425" r="3.5" fill="#22D3EE"/>
  <text x="741" y="430" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" fill="#22D3EE">4-Port KVM</text>

  <!-- ── Spec annotations ───────────────────────────────────── -->
  <g font-family="Inter,system-ui,sans-serif" font-size="10" fill="#334155" opacity="0.9">
    <text x="25" y="100">--color-bg-page: #090D1A</text>
    <text x="25" y="113">--pattern-dot-grid applied</text>
    <text x="25" y="220">Nav h=60px · --color-border bottom</text>
    <text x="25" y="268">Hero logo: 2× scale (128px icon + 52px wordmark)</text>
    <text x="25" y="280">font-family: --font-mono · font-weight: 700</text>
    <text x="25" y="310">Tagline: --font-sans 20px · --color-text-muted</text>
    <text x="25" y="370">btn--primary · --color-blue · rx=8</text>
    <text x="25" y="382">btn--ghost  · --color-border · rx=8</text>
    <text x="25" y="438">badges: --color-bg-card · 26px h · rx=5</text>
  </g>
</svg>
