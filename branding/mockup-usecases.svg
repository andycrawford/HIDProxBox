<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420">
  <title>HIDProxBox — Use-Case Cards Mockup</title>
  <defs>
    <pattern id="uc-dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.8" fill="#1E2D45" opacity="0.7"/>
    </pattern>
  </defs>

  <!-- Background: Midnight with dot grid -->
  <rect width="1280" height="420" fill="#090D1A"/>
  <rect width="1280" height="420" fill="url(#uc-dots)"/>

  <!-- ── Section heading ─────────────────────────────────────── -->
  <text x="640" y="54" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="36" font-weight="700" fill="#F1F5F9">
    Who builds this?
  </text>
  <text x="640" y="80" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif" font-size="15" fill="#475569">
    Three setups that make commercial KVMs look overpriced and underpowered
  </text>

  <!--
    3 cards, equal width
    Margin: 40px each side · gap: 24px
    Card width: (1280 − 80 − 48) / 3 = 384px   height: 280px   y: 108
  -->

  <!-- ── Card 1: The Multi-Machine Developer (cyan accent) ───── -->
  <rect x="40"  y="108" width="384" height="288" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <!-- Top accent strip (cyan) -->
  <rect x="40"  y="108" width="384" height="4" rx="2" fill="#22D3EE"/>
  <!-- Category badge -->
  <rect x="56"  y="124" width="80" height="22" rx="4" fill="#0F172A" stroke="#22D3EE" stroke-width="1"/>
  <circle cx="68" cy="135" r="3" fill="#22D3EE"/>
  <text x="76" y="139" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#22D3EE">Developer</text>
  <!-- Title -->
  <text x="56" y="176" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700" fill="#F1F5F9">The Multi-Machine</text>
  <text x="56" y="197" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700" fill="#F1F5F9">Developer</text>
  <!-- Body -->
  <text x="56" y="226" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">Workstation left, work laptop docked</text>
  <text x="56" y="243" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">right, headless server underneath.</text>
  <text x="56" y="260" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">One ergonomic keyboard across all</text>
  <text x="56" y="277" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">three — no USB unplugging, no lag.</text>
  <!-- Divider -->
  <line x1="56" y1="306" x2="408" y2="306" stroke="#334155" stroke-width="1"/>
  <!-- Footer detail -->
  <circle cx="68" cy="325" r="3" fill="#22D3EE"/>
  <text x="78" y="329" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#475569">Button 1 → workstation · Button 2 → laptop (BT)</text>

  <!-- ── Card 2: The Clean-Desk Home Office (blue accent) ────── -->
  <rect x="448" y="108" width="384" height="288" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="448" y="108" width="384" height="4" rx="2" fill="#3B82F6"/>
  <rect x="464" y="124" width="92" height="22" rx="4" fill="#0F172A" stroke="#3B82F6" stroke-width="1"/>
  <circle cx="476" cy="135" r="3" fill="#3B82F6"/>
  <text x="484" y="139" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#3B82F6">Home Office</text>
  <text x="464" y="176" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700" fill="#F1F5F9">The Clean-Desk</text>
  <text x="464" y="197" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700" fill="#F1F5F9">Home Office</text>
  <text x="464" y="226" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">Personal Mac beside a company</text>
  <text x="464" y="243" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">Windows PC — IT policy blocks</text>
  <text x="464" y="260" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">software KVMs. HIDProxBox is</text>
  <text x="464" y="277" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">purely hardware from their view.</text>
  <line x1="464" y1="306" x2="816" y2="306" stroke="#334155" stroke-width="1"/>
  <circle cx="476" cy="325" r="3" fill="#3B82F6"/>
  <text x="486" y="329" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#475569">BT output → Mac stays cable-free</text>

  <!-- ── Card 3: The Maker Workbench (cyan accent) ───────────── -->
  <rect x="856" y="108" width="384" height="288" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <rect x="856" y="108" width="384" height="4" rx="2" fill="#22D3EE"/>
  <rect x="872" y="124" width="78" height="22" rx="4" fill="#0F172A" stroke="#22D3EE" stroke-width="1"/>
  <circle cx="884" cy="135" r="3" fill="#22D3EE"/>
  <text x="892" y="139" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#22D3EE">Maker</text>
  <text x="872" y="176" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700" fill="#F1F5F9">The Maker</text>
  <text x="872" y="197" font-family="Inter,system-ui,sans-serif" font-size="17" font-weight="700" fill="#F1F5F9">Workbench</text>
  <text x="872" y="226" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">Pi, STM32 discovery board, x86</text>
  <text x="872" y="243" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">test machine — all headless, all</text>
  <text x="872" y="260" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">needing occasional input. BT mech</text>
  <text x="872" y="277" font-family="Inter,system-ui,sans-serif" font-size="13" fill="#94A3B8">keyboard input, macro buttons.</text>
  <line x1="872" y1="306" x2="1224" y2="306" stroke="#334155" stroke-width="1"/>
  <circle cx="884" cy="325" r="3" fill="#22D3EE"/>
  <text x="894" y="329" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#475569">Touchscreen on project enclosure front panel</text>

  <!-- ── Spec annotations ────────────────────────────────────── -->
  <text x="25" y="412" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#334155">
    Card: w=384px h=288px rx=10 · 4px top strip · badge pill rx=4 · --color-bg-card · gap=24px · margin=40px
  </text>
</svg>
